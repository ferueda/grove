name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create release tags/commits
      pull-requests: write # to create the "Version Packages" PR
      id-token: write # required for NPM provenance

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs correctly
          fetch-depth: 0

      - run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Install Dependencies
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm install --frozen-lockfile

      - name: Verify Builds and Tests
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm check

      - name: Build Workspace
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm build

      - name: Publish to NPM
        if: ${{ steps.release.outputs.releases_created }}
        run: pnpm -r publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true
