name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          auto — default release-please behavior (publish when a release PR was merged).
          release-pr — open or refresh the release PR only; merge it yourself to publish.
          force — bump version from current main and publish (for dependency-only changes).
        required: true
        default: auto
        type: choice
        options:
          - auto
          - release-pr
          - force
      bump:
        description: Version bump when mode is force
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create release tags/commits
      pull-requests: write # to create the "Version Packages" PR
      id-token: write # required for NPM provenance

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve release mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

      # release-please-action fetches config files from the base branch, not the checkout.
      # Force-mode configs must be checked in before this action can read them.
      - name: Resolve release config
        id: config
        env:
          MODE: ${{ steps.mode.outputs.value }}
          BUMP: ${{ inputs.bump || 'patch' }}
        run: |
          if [ "$MODE" = "force" ]; then
            case "$BUMP" in
              major|minor|patch) echo "file=release-please-config.force-${BUMP}.json" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unsupported bump: $BUMP" >&2; exit 1 ;;
            esac
          else
            echo "file=release-please-config.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or refresh release PR
        if: ${{ steps.mode.outputs.value == 'force' || steps.mode.outputs.value == 'release-pr' }}
        uses: googleapis/release-please-action@v5
        id: release_pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ steps.config.outputs.file }}
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Merge release PR
        if: ${{ steps.mode.outputs.value == 'force' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head release-please--branches--main --base main --json number --jq '.[0].number')
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No release PR found to merge" >&2
            exit 1
          fi
          gh pr merge "$PR" --merge --delete-branch
          git pull origin main

      - name: Release Please
        if: ${{ steps.mode.outputs.value != 'release-pr' }}
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: ${{ steps.mode.outputs.value == 'force' }}

      - name: Install Dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify Builds and Tests
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm check

      - name: Build Workspace
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm build

      - name: Publish to NPM
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm -r publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true
